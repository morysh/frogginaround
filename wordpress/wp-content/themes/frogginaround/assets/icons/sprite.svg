<svg xmlns="http://www.w3.org/2000/svg">
    <symbol id="hamburger"
            viewBox="-5 -5 105 105">
        <rect width="100"
              height="20"
              x="0"
              y="10"
              rx="5"
              ry="5"/>
        <rect width="100"
              height="20"
              x="0"
              y="40"
              rx="5"
              ry="5"/>
        <rect width="100"
              height="20"
              x="0"
              y="70"
              rx="5"
              ry="5"/>
    </symbol>
    <symbol id="cross"
            viewBox="-5 -5 105 105">
        <line x1="10" y1="10" x2="90" y2="90" stroke-width="20" stroke-linecap="round"/>
        <line x1="90" y1="10" x2="10" y2="90" stroke-width="20" stroke-linecap="round"/>
    </symbol>
</svg>